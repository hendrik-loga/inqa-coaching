name: BusinessCardScanner
options:
  bundleIdPrefix: com.inqacoaching
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15"
  createIntermediateGroups: true
  defaultConfig: Debug

settings:
  SWIFT_VERSION: "5.9"

configs:
  Debug: debug
  Release: release

targets:
  BusinessCardScanner:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: BusinessCardScanner
    info:
      path: BusinessCardScanner/Info.plist
      properties:
        CFBundleDisplayName: Visitenkarten Scanner
        NSCameraUsageDescription: "Die Kamera wird zum Scannen von Visitenkarten benötigt."
        NSContactsUsageDescription: "Der Zugriff auf Kontakte wird benötigt, um gescannte Visitenkarten als Kontakt zu speichern."
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: true
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.inqacoaching.businesscardscanner
      IPHONEOS_DEPLOYMENT_TARGET: "16.0"
      SWIFT_VERSION: "5.9"
      DEVELOPMENT_TEAM: ""
      CODE_SIGN_STYLE: Automatic
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    preBuildScripts: []
